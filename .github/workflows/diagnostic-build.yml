name: Diagnostic Linux build

on:
  push:
    branches:
      - "diagnostic/**"

permissions:
  contents: read

jobs:
  x86_64-linux-musl:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    env:
      CC_x86_64_unknown_linux_musl: musl-gcc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install musl build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add x86_64-unknown-linux-musl

      - name: Build diagnostic binary
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --locked --release --target x86_64-unknown-linux-musl -p codex-consensus

      - name: Verify diagnostic binary
        run: |
          binary=target/x86_64-unknown-linux-musl/release/codex-consensus
          bash tests/static-link.sh "$binary"
          "$binary" --version

      - name: Upload diagnostic binary
        uses: actions/upload-artifact@v7
        with:
          name: codex-consensus-diagnostic-x86_64-linux-musl
          path: target/x86_64-unknown-linux-musl/release/codex-consensus
          if-no-files-found: error
