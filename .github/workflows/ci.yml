name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Format, lint, and test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal --component rustfmt --component clippy

      - name: Install minimum supported Rust toolchain
        run: rustup toolchain install 1.85.0 --profile minimal

      - name: Check minimum supported Rust version
        run: cargo +1.85.0 check --locked --workspace --all-targets

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run workspace tests
        run: cargo test --workspace -- --test-threads=1

      - name: Check public documentation
        run: bash tests/docs.sh

      - name: Regression-test release version gate
        run: bash tests/release-gate.sh

  supply-chain:
    name: Audit dependencies and licenses
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        run: rustup toolchain install stable --profile minimal

      - name: Install audit tools
        run: |
          cargo install --locked cargo-audit
          cargo install --locked cargo-deny

      - name: Audit RustSec advisories
        run: cargo audit

      - name: Check dependency licenses
        run: cargo deny check licenses

  portable-linux:
    name: Portable ${{ matrix.target }} binary
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            runner: ubuntu-24.04
          - target: aarch64-unknown-linux-musl
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    env:
      CC_x86_64_unknown_linux_musl: musl-gcc
      CARGO_TARGET_X86_64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
      CC_aarch64_unknown_linux_musl: musl-gcc
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_MUSL_LINKER: musl-gcc
    steps:
      - name: Check out source
        uses: actions/checkout@v6

      - name: Install musl build tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes musl-tools

      - name: Install Rust target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add "${{ matrix.target }}"

      - name: Build locked static binary
        env:
          RUSTFLAGS: "-C target-feature=+crt-static"
        run: cargo build --locked --release --target "${{ matrix.target }}" -p codex-consensus

      - name: Verify static linkage and executable smoke tests
        shell: bash
        run: |
          binary="target/${{ matrix.target }}/release/codex-consensus"
          bash tests/static-link.sh "$binary"
          "$binary" --version
          "$binary" --help >/dev/null
